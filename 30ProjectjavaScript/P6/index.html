<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            font-size: 20px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
        }

        .box {
            width: 500px;
            height: 50px;
            background-color: rgb(31, 31, 30);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .input {
            width: 100%;
            height: 50px;
            border: none;
            outline: none;
            background-color: transparent;
            color: aliceblue;
            font-size: 1.2rem;
            padding: 0 10px;
        }

        .eye {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <input type="password" class="input" id="input" placeholder="password"/>
        <img src="image/eye-close.png" alt="eye" id="icon" class="eye">
    </div>

    <script>
        const input = document.getElementById("input");
        const icon = document.getElementById("icon");

        icon.addEventListener("click", () => {
            if (input.type === "password") {
                input.type = "text";
                icon.src = "image/eye-open.png";
            } else {
                input.type = "password";
                icon.src = "image/eye-close.png";
            }
        });
    </script>
</body>
<script>
</script>
</html>
