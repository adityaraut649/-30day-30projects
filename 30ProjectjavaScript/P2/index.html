<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update CSS Variables with JavaScript</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* 1. Define variables at the root level */
      :root {
        --base-color: #797462;
        --spacing: 10px;
        --blur: 5px;
      }

      body {
        background-color: #121212; /* Slightly softer black */
        color: white;
        font-family: "Lora", serif;
        text-align: center;
      }

      h1 {
        margin-top: 50px;
      }

      /* Container for controls */
      .box {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px; /* Space between inputs */
        width: fit-content;
        margin: 40px auto;
        padding: 20px;
        background: #1e1e1e;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      .lable {
        font-size: 16px;
      }

      /* 2. Apply variables to the image */
      .img img {
        padding: var(--spacing);
        background: var(--base-color);
        filter: blur(var(--blur));
        border-radius: 8px;
        transition: all 0.1s; /* Smooths out the changes */
      }

      /* Styling the color picker specifically */
      input[type="color"] {
        cursor: pointer;
        border: none;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <h1>Update CSS Variables with <span class="hl">JS</span></h1>

    <div class="box">
      <label for="spacing">Spacing:</label>
      <input
        id="spacing"
        type="range"
        name="spacing"
        min="10"
        max="100"
        value="10"
        data-sizing="px"
      />

      <label for="blur">Blur:</label>
      <input
        id="blur"
        type="range"
        name="blur"
        min="0"
        max="25"
        value="5"
        data-sizing="px"
      />

      <label for="base">Base Color:</label>
      <input id="base" type="color" name="base" value="#ffc600" />
    </div>

    <div class="img">
      <img
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=500&q=60"
        alt="image"
      />
    </div>
    <script>
      const inputs = document.querySelectorAll(".box input");

      function handleUpdate() {
        const suffix = this.dataset.sizing || "";
        // Set the property on the document element (root)
        document.documentElement.style.setProperty(
          `--${this.name}`,
          this.value + suffix,
        );
      }

      inputs.forEach((input) => input.addEventListener("change", handleUpdate));
      inputs.forEach((input) =>
        input.addEventListener("mousemove", handleUpdate),
      );
    </script>
  </body>
</html>
